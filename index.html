function deepSetRule(path, value){
  const parts = path.split('.');
  let obj = CLINICAL_RULEBOOK;
  while(parts.length > 1){
    const key = parts.shift();
    if(!(key in obj) || typeof obj[key] !== 'object') throw new Error('Chemin de règle invalide: ' + path);

  }
  obj[parts[0]] = value;
  return CLINICAL_RULEBOOK;
}

// Dynamic serology/treatment rows stay unlimited; only their visible labels/options are source-driven.
function translateDynamicFormFields(){
  document.querySelectorAll('#seroList .rowbox').forEach(row => {
    const labels=row.querySelectorAll('label');
    if(labels[0]) labels[0].textContent=extraT('date');
    if(labels[1]) labels[1].textContent=extraT('eia');
    if(labels[2]) labels[2].textContent=extraT('tpha');
    if(labels[3]) labels[3].textContent=extraT('vdrlInput');
    [row.querySelector('.sero-eia'), row.querySelector('.sero-tpha')].forEach(sel => {
      if(!sel) return;
      const opts=sel.querySelectorAll('option');
      if(opts[1]) opts[1].textContent=extraT('positive');
      if(opts[2]) opts[2].textContent=extraT('negative');
      if(opts[3]) opts[3].textContent=extraT('indeterminate');
    });
    const rm=row.querySelector('.btnRemoveSero'); if(rm) rm.textContent=extraT('remove');
  });
  document.querySelectorAll('#treatmentList .rowbox').forEach(row => {
    const labels=row.querySelectorAll('label');
    if(labels[0]) labels[0].textContent=extraT('date');
    if(labels[1]) labels[1].textContent=extraT('treatment');
    const sel=row.querySelector('.tx-type');
    if(sel){
      const map=['','benz1','doxy2','cef7','benz3','doxy4','peniv','cef14','unknown'];
      sel.querySelectorAll('option').forEach((opt, idx) => { if(map[idx]) opt.textContent=treatmentLabel(map[idx]); });
    }
    const rm=row.querySelector('.btnRemoveTx'); if(rm) rm.textContent=extraT('remove');
  });
  const csfPanel=document.getElementById('csfPanel');
  if(csfPanel){
    const title=csfPanel.querySelector('.section-title'); if(title) title.textContent=(UI_I18N[currentLang]||UI_I18N.fr).lcr;
    const labels=csfPanel.querySelectorAll('label');
    if(labels[0]) labels[0].textContent=extraT('csfTpha');
    if(labels[1]) labels[1].textContent=extraT('csfVdrl');
    [document.getElementById('csfTpha'), document.getElementById('csfVdrl')].forEach(sel => { if(sel){ const opts=sel.querySelectorAll('option'); if(opts[1]) opts[1].textContent=extraT('positive'); if(opts[2]) opts[2].textContent=extraT('negative'); } });
  }
}

function translateFromDictionaries(text){
  if(text == null) return text;
  let out = String(text);

  const dictSources = [];
  if(typeof MORE_I18N !== "undefined" && MORE_I18N.fr) dictSources.push(MORE_I18N);
  if(typeof EXTRA_I18N !== "undefined" && EXTRA_I18N.fr) dictSources.push(EXTRA_I18N);
  if(typeof SOURCE_CLINICAL_I18N !== "undefined" && SOURCE_CLINICAL_I18N.fr) dictSources.push(SOURCE_CLINICAL_I18N);
  if(typeof DYN_I18N !== "undefined" && DYN_I18N.fr) dictSources.push(DYN_I18N);

  for(const dict of dictSources){
    const frMap = dict.fr || {};
    const curMap = dict[currentLang] || {};

    const valueEntries = Object.keys(frMap)
      .map(k => [frMap[k], (curMap[k] || frMap[k])])
      .filter(([frVal, curVal]) => typeof frVal === "string" && frVal && frVal !== curVal)
      .sort((a,b) => b[0].length - a[0].length);
    for(const [frVal, curVal] of valueEntries){
      out = out.split(frVal).join(curVal);
    }

    const keyEntries = Object.keys(curMap)
      .map(k => [k, curMap[k]])
      .filter(([k, curVal]) => typeof curVal === "string" && k && curVal)
      .sort((a,b) => b[0].length - a[0].length);
    for(const [keyName, curVal] of keyEntries){
      out = out.split(keyName).join(curVal);
    }
  }
  return out;
}

function translateResultText(text){
  return translatePlainText(text);

function resolveReasonToken(token){
  const key = String(token || '').trim();
  if(!key) return key;
  const maps = [];
  if(typeof MORE_I18N !== "undefined") maps.push(MORE_I18N);
  if(typeof EXTRA_I18N !== "undefined") maps.push(EXTRA_I18N);
  if(typeof DYN_I18N !== "undefined") maps.push(DYN_I18N);
  for(const dict of maps){
    const cur = dict[currentLang] || {};
    const fr = dict.fr || {};
    if(typeof cur[key] === 'string') return cur[key];
    if(typeof fr[key] === 'string') return fr[key];
  }
  return key;
}
function normalizeReasonString(value){
  if(value == null) return value;
  const raw = String(value);
  const resolved = raw
    .split('|')
    .map(s => resolveReasonToken(s.trim()))
    .join(' | ');
  return translatePlainText(resolved);
}

function parseDate(s){ return new Date(s + "T00:00:00"); }
function daysDiff(a,b){ return Math.round((a - b)/(1000*60*60*24)); }
function absDays(a,b){ return Math.abs(daysDiff(a,b)); }

function parseData(){
  const serologies = [...document.querySelectorAll("#seroList .rowbox")].map(row => {
    const dateStr = row.querySelector(".sero-date").value;
    if(!dateStr) return null;
    const eia = row.querySelector(".sero-eia").value || null;
    const tpha = row.querySelector(".sero-tpha").value || null;
    const raw = row.querySelector(".sero-vdrl").value;
    let vdrl = raw === "" ? null : Number(raw);
    if(Number.isNaN(vdrl)) vdrl = null;
    return { date: parseDate(dateStr), dateStr, eia, tpha, vdrl };
  }).filter(Boolean).sort((a,b)=>a.date-b.date);

  const treatments = [...document.querySelectorAll("#treatmentList .rowbox")].map(row => {
    const dateStr = row.querySelector(".tx-date").value;
    const type = row.querySelector(".tx-type").value || null;
    if(!dateStr || !type) return null;
    return { date: parseDate(dateStr), dateStr, type };
  }).filter(Boolean).sort((a,b)=>a.date-b.date);

  return { identifier: document.getElementById("patientId").value.trim(), analysisDate: document.getElementById("analysisDate").value, serologies, treatments };
}

function hasBiologicalData(serologies){
  return serologies.some(s => (s.eia && s.eia !== "") || (s.tpha && s.tpha !== "") || s.vdrl !== null);
}

function renderChart(serologies, treatments){
  const ctx = document.getElementById("chart");
  if(!ctx) return;

  const allDates = [...new Set([
    ...serologies.map(s => s.dateStr),
    ...treatments.map(t => t.dateStr)
  ])].sort();

  function plotValue(v, eia, tpha){
    if((v === null || v === undefined) && (eia === "neg" || tpha === "neg")) return 0;
    if(v === null || v === undefined) return null;
    if(v === 0) return 0;
    if(v > 0) return Math.log2(v) + 1;
    return null;
  }

  const serologyByDate = new Map(serologies.map(s => [s.dateStr, s]));
  const treatmentsByDate = new Map();
  treatments.forEach(t => {
    if(!treatmentsByDate.has(t.dateStr)) treatmentsByDate.set(t.dateStr, []);
    treatmentsByDate.get(t.dateStr).push(treatmentLabel(t.type));
  });

  const vdrlValues = allDates.map(dateStr => {
    const s = serologyByDate.get(dateStr);
    return s ? plotValue(s.vdrl, s.eia, s.tpha) : null;
  });

  const pointLabels = allDates.map(dateStr => {
    const s = serologyByDate.get(dateStr);
    if(!s) return "";
    const parts = [];
    if(s.eia) parts.push("EIA " + (s.eia==="pos"?"+":s.eia==="neg"?"-":"ind"));
    if(s.tpha) parts.push("TPHA " + (s.tpha==="pos"?"+":s.tpha==="neg"?"-":"ind"));
    parts.push("VDRL " + (s.vdrl === null ? "—" : s.vdrl));
    return parts.join(" | ");
  });

  const treatmentPoints = allDates.map(dateStr => treatmentsByDate.has(dateStr) ? 1 : null);
  const treatmentLabels = allDates.map(dateStr => (treatmentsByDate.get(dateStr) || []).join(" ; "));

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    data: {
      labels: allDates,
      datasets: [
        {
          type: "line",
          label: extraT("chartVdrl"),
          data: vdrlValues,
          tension: 0.2,
          borderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 5,
          spanGaps: true,
          yAxisID: "y"
        },
        {
          type: "bar",
          label: extraT("chartTreatment"),
          data: treatmentPoints,
          yAxisID: "yTx",
          barThickness: 10
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { top: 8, right: 10, bottom: 8, left: 8 }
      },
      plugins: {
        legend: { display: true },
        tooltip: {
          callbacks: {
            afterLabel: function(context){
              if(context.datasetIndex === 0){
                return pointLabels[context.dataIndex] || "";
              }
              if(context.datasetIndex === 1){
                return treatmentLabels[context.dataIndex] ? (extraT("chartTreatmentPrefix") + treatmentLabels[context.dataIndex]) : "";
              }
              return "";
            }
          }
        }
      },
      scales: {
        y: {
          min: 0,
          max: 16,
          ticks: {
            callback: function(value){
              const map = {
                0:"0", 1:"1", 2:"2", 3:"4", 4:"8", 5:"16", 6:"32", 7:"64",
                8:"128", 9:"256", 10:"512", 11:"1024", 12:"2048", 13:"4096",
                14:"8192", 15:"16384", 16:"32768"
              };
              return map[value] ?? "";
            }
          },
          title: {
            display: true,
            text: extraT("chartAxis")
          }
        },
        yTx: {
          position: "right",
          min: 0,
          max: 1.4,
          display: false,
          grid: { display: false }
        },
        x: {
          ticks: {
            maxRotation: 0,
            autoSkip: true
          }
        }
      }
    }
  });
}
function trepPositive(s){ return s && (s.eia==="pos" || s.tpha==="pos"); }
function trepNegativeOrMissingVdrl(s){
  if((s.eia==="neg" || s.tpha==="neg") && s.vdrl===null) return true;
  const noPos = s.eia!=="pos" && s.tpha!=="pos";
  return noPos && ((s.eia==="neg" || s.tpha==="neg") && (!s.vdrl || s.vdrl===0));
}
function trepIndeterminate(s){ return (s.eia==="ind" || s.tpha==="ind") && !trepPositive(s); }
function vdrlPositive(v){ return v !== null && v > 0; }
function isValidVDRL(v){
  if(v === null || v === undefined || v === "") return true;
  const valid = new Set([0,1,2,4,8,16,32,64,128,256,512,1024,2048,4096,8192,16384,32768]);
  return valid.has(Number(v));
}

function getEpisodeSerologyForTreatment(serologies, tx){
  const within7After = serologies.find(s => daysDiff(s.date, tx.date) >= 0 && daysDiff(s.date, tx.date) <= 7);
  if(within7After) return { serology: within7After };
  const before = [...serologies].filter(s => s.date <= tx.date).slice(-1)[0];
  return { serology: before || null };
}

function currentClinical(){

  const chancreDoubtful = !!document.getElementById("chancreDoubtful")?.checked;
  const exanthemeTypical = !!document.getElementById("exanthemeTypical")?.checked;
  const cutaneousAtypical = !!document.getElementById("cutaneousAtypical")?.checked;
  return {
    chancreTypical,
    chancreDoubtful,
    chancre: chancreTypical || chancreDoubtful,
    contact: !!document.getElementById("contact")?.checked,
    neuro: !!document.getElementById("neuro")?.checked,

  };
}
function categoryAtSerology(serologiesUpToIndex, serology, clinical){
  const prevNegTrep = serologiesUpToIndex.some(s => s.date < serology.date && (s.eia==="neg" || s.tpha==="neg"));
  const prevNegVdrl = serologiesUpToIndex.some(s => s.date < serology.date && s.vdrl===0);
  if(clinical.neuro && trepPositive(serology) && vdrlPositive(serology.vdrl)) return "neuro";
  if(trepIndeterminate(serology)){
    if(clinical.contact || clinical.chancre) return "early";
    return clinical.scarKnown ? "scar" : "recontrol";
  }
  if(clinical.chancre && trepNegativeOrMissingVdrl(serology)) return "early";
  if(clinical.contact && trepNegativeOrMissingVdrl(serology)) return "early";
  if((serology.tpha==="pos" || serology.eia==="pos") && (serology.vdrl===null || serology.vdrl===0)){
    if(clinical.chancre || clinical.contact) return "early";
    if(clinical.scarKnown) return "scar";
    return "recontrol";
  }
  if((serology.tpha==="pos" || serology.eia==="pos") && vdrlPositive(serology.vdrl)){
    if(clinical.chancre) return "early";
    if(prevNegTrep || prevNegVdrl) return "early";
    return "late";
  }
  return null;
}

    let expected = null;
    if(ep.serology){
      expected = categoryAtSerology(serologies.filter(s=>s.date<=ep.serology.date), ep.serology, clinical);
    }

    const group = TREATMENTS[tx.type]?.group || "unknown";
    const afterTx = serologies.filter(s => s.date > tx.date);
    const hasZeroAfter = afterTx.some(s => s.vdrl === 0);
    let valid = false, overtreated = false, staleForCurrentEpisode = false;
    let reasonKey = "noUsableBiology";

    if(tx.type==="unknown"){
      valid = hasZeroAfter;
      reasonKey = valid ? "unknownImproved" : "unknownNoProof";
    } else if(expected==="early"){
      if(group==="early"){
        valid = true;
        reasonKey = "validEarly";
      } else if(group==="late" || group==="neuro"){
        valid = true;
        overtreated = true;
        reasonKey = "overtreatedEarly";
      }
    } else if(expected==="late"){
      if(group==="late"){
        valid = true;
        reasonKey = "validLate";
      } else if(group==="early"){
        reasonKey = "undertreatedLate";
      } else if(group==="neuro"){
        reasonKey = "invalidNeuroForLate";
      }
    } else if(expected==="neuro"){
      if(group==="neuro"){
        valid = true;
        reasonKey = "validNeuro";
      } else {
        reasonKey = "undertreatedNeuro";
      }
    } else if(expected==="scar" || expected==="recontrol"){
      reasonKey = "stageScarNoImmediate";
    }

    if(valid && expected!=="neuro" && lastSerology && vdrlPositive(lastSerology.vdrl) && daysDiff(lastSerology.date, tx.date) > 365 && !hasZeroAfter){
      valid = false;
      staleForCurrentEpisode = true;
      overtreated = false;
      reasonKey = "stalePositiveNoZero";
    }

    return {
      ...tx,
      valid,
      expected,
      overtreated,
      staleForCurrentEpisode,
      reasonKey,
      linkedSerologyDateStr: ep.serology ? ep.serology.dateStr : ""
    };
  });
}
function getLastValidTreatment(audits){
  return [...audits].filter(a=>a.valid && !a.staleForCurrentEpisode).slice(-1)[0] || null;

function dilutionDiff(current, reference){
  if(current===null || reference===null) return null;
  if(reference===0 && current>1) return Infinity;
  if(reference<=0 || current<=0) return null;
  return Math.log2(current)-Math.log2(reference);
}

${recommended_treatment}`,

${recommended_treatment}`,

      { identifier, analysisDate:document.getElementById("analysisDate").value, conclusion, category, recommended_treatment, compare:vdrlSeries.length >= 2 ? `${vdrlSeries[0].dateStr} (VDRL ${vdrlSeries[0].vdrl}) → ${last.dateStr} (VDRL ${last.vdrl})` : `${last.dateStr} (VDRL ${last.vdrl})`, tx:txText, why:finalWhy([...why,"pas d’antécédent négatif","pas de traitement validé","pas de chancre"]), serologies, treatments }, parsed, clinical, expert.join("\n")
    );
  }

  const lastTxWithin7 = lastValidTx && lastVDRL && daysDiff(lastVDRL.date, lastValidTx.date) >= 0 && daysDiff(lastVDRL.date, lastValidTx.date) <= 7;

    const category = lastValidTx.expected || "early";

`${badge("success", tr("treated"))}

    );
  }

  if(lastValidTx && lastVDRL && lastVDRL.date >= lastValidTx.date){

    if(ref){
      const diff = dilutionDiff(lastVDRL.vdrl, ref.vdrl);

      if(diff !== null && diff <= -2 && absDays(lastVDRL.date, ref.date) < 90){
        const category = "scar";

`${badge("warning", dynT("kinetic_badge"))}

${recommended_treatment}`,

async function exportPdf(){
  if(!lastAnalysisPayload){ alert(logicT("launchAnalysisFirst")); return; }
  const p = lastAnalysisPayload;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"mm", format:"a4"});
  const safeId = (p.identifier || 'sans_identifiant').replace(/[\/:*?"<>|]/g, '_');
  const safeDate = (p.analysisDate || 'date').replace(/[\/:*?"<>|]/g, '_');

  // Prefer browser-rendered capture so CJK/Arabic glyphs survive in the PDF.
  if(window.html2canvas){
    const wrapper = document.createElement("div");
    wrapper.style.position = "fixed";
    wrapper.style.left = "-10000px";
    wrapper.style.top = "0";
    wrapper.style.width = "900px";
    wrapper.style.background = "#ffffff";
    wrapper.style.color = "#163a63";
    wrapper.style.padding = "24px";
    wrapper.style.fontFamily = '"Noto Sans", "Noto Sans CJK SC", "Noto Sans CJK JP", "Noto Naskh Arabic", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif';
    wrapper.lang = currentLang;
    wrapper.dir = currentLang === "ar" ? "rtl" : "ltr";
    wrapper.style.lineHeight = "1.45";
    wrapper.style.zIndex = "-1";

    const title = document.createElement("div");
    title.style.fontSize = "24px";
    title.style.fontWeight = "700";
    title.style.marginBottom = "8px";
    title.textContent = moreT("pdfTitle");
    wrapper.appendChild(title);

    const meta = document.createElement("div");
    meta.style.fontSize = "14px";
    meta.style.marginBottom = "16px";
    meta.innerHTML = `<div>${fmtMore("pdfIdentifier",{v:p.identifier||""})}</div><div>${fmtMore("pdfAnalysisDate",{v:p.analysisDate||""})}</div>`;
    wrapper.appendChild(meta);

    const addBlock = (label, htmlContent) => {
      const block = document.createElement("div");
      block.style.border = "1px solid #d9e3f0";
      block.style.borderRadius = "12px";
      block.style.padding = "12px 14px";
      block.style.marginBottom = "12px";
      const h = document.createElement("div");
      h.style.fontWeight = "700";
      h.style.marginBottom = "6px";
      h.textContent = label;
      const c = document.createElement("div");
      c.style.whiteSpace = "pre-wrap";
      c.innerHTML = htmlContent;
      block.appendChild(h);
      block.appendChild(c);
      wrapper.appendChild(block);
    };

    addBlock(moreT("pdfConclusion"), document.getElementById("resultBox").innerHTML);
    addBlock(moreT("pdfCompare"), document.getElementById("compareInfo").innerHTML);
    addBlock(moreT("pdfTx"), document.getElementById("txInfo").innerHTML);
    addBlock(moreT("pdfWhy"), document.getElementById("whyInfo").innerHTML);

    const chartBlock = document.createElement("div");
    chartBlock.style.border = "1px solid #d9e3f0";
    chartBlock.style.borderRadius = "12px";
    chartBlock.style.padding = "12px 14px";
    chartBlock.style.marginBottom = "12px";
    const chartTitle = document.createElement("div");
    chartTitle.style.fontWeight = "700";
    chartTitle.style.marginBottom = "6px";
    chartTitle.textContent = moreT("pdfChart");
    chartBlock.appendChild(chartTitle);
    const chartCanvas = document.getElementById("chart");
    if(chartCanvas && chartCanvas.width){
      const img = document.createElement("img");
      img.src = chartCanvas.toDataURL("image/png", 1.0);
      img.style.width = "100%";
      img.style.height = "auto";
      chartBlock.appendChild(img);
    }
    wrapper.appendChild(chartBlock);

    addBlock(moreT("pdfSeroTimeline"), (p.serologies || []).map(s => `${s.dateStr} | EIA: ${translatePlainText(s.eia || "—")} | TPHA: ${translatePlainText(s.tpha || "—")} | VDRL: ${s.vdrl ?? "—"}`).join("<br>"));
    addBlock(moreT("pdfTxTimeline"), (p.treatments || []).length ? (p.treatments || []).map(t => `${t.dateStr} | ${treatmentLabel(t.type) || t.type}`).join("<br>") : moreT("pdfNoTx"));

    const csfData = p.csf || { tpha: document.getElementById("csfTpha")?.value || "", vdrl: document.getElementById("csfVdrl")?.value || "" };
    if(csfData.tpha || csfData.vdrl){
      const formatLcr = (v) => { if(v === "neg") return moreT("pdfNeg"); if(v === "pos") return moreT("pdfPos"); return moreT("pdfUnknown"); };
      addBlock(moreT("pdfCSF"), `${extraT("csfTpha")} : ${formatLcr(csfData.tpha)}<br>${extraT("csfVdrl")} : ${formatLcr(csfData.vdrl)}`);
    }

    document.body.appendChild(wrapper);
    try{
      const canvas = await html2canvas(wrapper, {scale: 2, backgroundColor: "#ffffff", useCORS: true, logging: false, foreignObjectRendering: false});
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const imgWidth = pageWidth - 20;
      const imgHeight = canvas.height * imgWidth / canvas.width;
      const imgData = canvas.toDataURL("image/png");

      let heightLeft = imgHeight;
      let position = 10;
      doc.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
      while(heightLeft > 0){
        position = 10 - (imgHeight - heightLeft);
        doc.addPage();
        doc.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
        heightLeft -= (pageHeight - 20);
      }
      doc.save(fmtMore("pdfFilename", {id: safeId, date: safeDate}));
      return;
    }catch(e){
      console.error(e);
    }finally{
      wrapper.remove();
    }
  }

  // Fallback text mode if html2canvas is unavailable.
  let y = 14;
  function line(text,size=11,gap=7){ doc.setFontSize(size); const lines = doc.splitTextToSize(text,180); doc.text(lines,14,y); y += lines.length*gap; if(y>275){doc.addPage(); y=14;} }
  function block(title,text){ doc.setFillColor(245,248,253); doc.roundedRect(10,y-4,190,12,3,3,'F'); doc.setFontSize(13); doc.text(title,14,y+4); y += 12; line(text,11,6); y += 4; }
  doc.setFontSize(18); doc.text(moreT("pdfTitle"),14,y); y += 10;
  line(fmtMore("pdfIdentifier", {v: p.identifier || ""}));
  line(fmtMore("pdfAnalysisDate", {v: p.analysisDate || ""}));
  block(moreT("pdfConclusion"), translatePlainText(p.conclusion || ""));
  block(moreT("pdfCompare"), translatePlainText(p.compare || ""));
  block(moreT("pdfTx"), translatePlainText(p.tx || ""));
  block(moreT("pdfWhy"), translatePlainText(p.why || ""));
  doc.save(fmtMore("pdfFilename", {id: safeId, date: safeDate}));
}

function enforceExclusiveChancre(choice){
  const typical = document.getElementById("chancreTypical");
  const doubtful = document.getElementById("chancreDoubtful");
  if(choice === "typical" && typical.checked) doubtful.checked = false;
  if(choice === "doubtful" && doubtful.checked) typical.checked = false;
}

function enforceExclusiveCutaneous(choice){
  const typical = document.getElementById("exanthemeTypical");
  const atypical = document.getElementById("cutaneousAtypical");
  if(!typical || !atypical) return;
  if(choice === "typical" && typical.checked) atypical.checked = false;
  if(choice === "atypical" && atypical.checked) typical.checked = false;
}

function openBigChart(){
  const serologies = parseData().serologies;
  const treatments = parseData().treatments;
  if(!serologies.length && !treatments.length){
    alert(logicT("launchAnalysisFirst"));
    return;
  }
  const win = window.open("", "_blank");
  if(!win) return;

  function plotValue(v, eia, tpha){
    if((v === null || v === undefined) && (eia === "neg" || tpha === "neg")) return 0;
    if(v === null || v === undefined) return null;
    if(v === 0) return 0;
    if(v > 0) return Math.log2(v) + 1;
    return null;
  }

  const allDates = [...new Set([
    ...serologies.map(s => s.dateStr),
    ...treatments.map(t => t.dateStr)
  ])].sort();

  const serologyByDate = Object.fromEntries(serologies.map(s => [s.dateStr, s]));
  const treatmentsByDate = {};
  treatments.forEach(t => {
    if(!treatmentsByDate[t.dateStr]) treatmentsByDate[t.dateStr] = [];
    treatmentsByDate[t.dateStr].push(TREATMENTS[t.type]?.label || t.type);
  });

  const chartData = {
    labels: allDates,
    vdrl: allDates.map(dateStr => {
      const s = serologyByDate[dateStr];
      return s ? plotValue(s.vdrl, s.eia, s.tpha) : null;
    }),
    txBars: allDates.map(dateStr => treatmentsByDate[dateStr] ? 1 : null),
    txLabels: allDates.map(dateStr => (treatmentsByDate[dateStr] || []).join(" ; ")),
    pointLabels: allDates.map(dateStr => {
      const s = serologyByDate[dateStr];
      if(!s) return "";
      const parts = [];
      if(s.eia) parts.push("EIA " + (s.eia==="pos"?"+":s.eia==="neg"?"-":"ind"));
      if(s.tpha) parts.push("TPHA " + (s.tpha==="pos"?"+":s.tpha==="neg"?"-":"ind"));
      const vdrlDisplay = (s.vdrl === null && (s.eia==="neg" || s.tpha==="neg")) ? 0 : (s.vdrl === null ? "—" : s.vdrl);
      parts.push("VDRL " + vdrlDisplay);
      return parts.join(" | ");
    })
  };

  win.document.write(`
    <html>
    <head>
      <title>Graphique VDRL</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
      <style>
        body{font-family:Arial;margin:12px;background:#f8fbff;color:#17324d}
        h1{font-size:20px;margin:0 0 10px}
        .box{height:78vh;max-height:78vh;background:#fff;border:1px solid #d6e2ef;border-radius:16px;padding:10px}
        .note{margin-top:10px;font-size:13px;color:#5f738d}
      </style>
    </head>
    <body>
      <h1>${extraT("bigChartTitle")}</h1>
      <div class="box"><canvas id="bigChart"></canvas></div>
      <div class="note">${extraT("bigChartNote")}</div>
      <script>
        const d = ${JSON.stringify(chartData)};
        new Chart(document.getElementById('bigChart'), {
          data: {
            labels: d.labels,
            datasets: [
              { type:'line', label:${JSON.stringify(extraT('chartVdrl'))}, data:d.vdrl, tension:0.2, borderWidth:2, pointRadius:4, pointHoverRadius:5, spanGaps:true, yAxisID:'y' },
              { type:'bar', label:${JSON.stringify(extraT('chartTreatment'))}, data:d.txBars, yAxisID:'yTx', barThickness:14 }
            ]
          },
          options: {
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
              legend:{display:true},
              tooltip:{
                callbacks:{
                  afterLabel:(context)=>{
                    if(context.datasetIndex===0) return d.pointLabels[context.dataIndex] || '';
                    return d.txLabels[context.dataIndex] ? (${JSON.stringify(extraT('chartTreatmentPrefix'))} + d.txLabels[context.dataIndex]) : '';
                  }
                }
              }
            },
            scales:{
              y:{
                min:0,
                max:16,
                ticks:{
                  callback:(value)=>{
                    const map={0:'0',1:'1',2:'2',3:'4',4:'8',5:'16',6:'32',7:'64',8:'128',9:'256',10:'512',11:'1024',12:'2048',13:'4096',14:'8192',15:'16384',16:'32768'};
                    return map[value] ?? '';
                  }
                },
                title:{display:true,text:${JSON.stringify(extraT('chartAxis'))}}
              },
              yTx:{position:'right',min:0,max:1.4,display:false,grid:{display:false}},
              x:{ticks:{maxRotation:0,autoSkip:true}}
            }
          }
        });
      <\/script>
    </body>
    </html>
  `);
  win.document.close();
}

const __rawAnalyse = analyse;
analyse = async function(){
  try {
    return await __rawAnalyse();
  } catch (error) {
    console.error('Analyse error:', error);
    const box = document.getElementById('resultBox');
    if(box){
      box.innerHTML = `${badge("danger", "Erreur d'analyse")}<div style="margin-top:10px">${String(error?.message || error)}</div>`;
    }
    const whyInfo = document.getElementById('whyInfo');
    if(whyInfo) whyInfo.textContent = normalizeReasonString('Erreur technique : ' + String(error?.message || error));
    throw error;
  }
};
